midas-train1:
  env_make_params:
    split: "train"
    num_trades: 3
    atr: true
    macd: true
    rsi: true
    initial_capital: 10000.0
    transaction_cost: 0.0002
    price_columns: 5
    episode_length: 5000
  env_id: 'midas-train1'
  learning_rate_a: 0.0002
  epsilon_init: 1.0
  epsilon_decay: 0.99999
  epsilon_min: 0.05
  discount_factor_g: 0.999
  fc1_nodes: 128
  replay_memory_size: 500000
  network_sync_rate: 5000
  enable_double_dqn: true
  enable_dueling_dqn: true
  min_buffer_fill: 10000
  mini_batch_size: 128
  max_episodes: 500

