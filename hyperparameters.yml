midas-train1:
  env_make_params:
    split: "train"
    num_trades: 3
    atr: true
    macd: true
    rsi: true
    initial_capital: 100000.0
    transaction_cost: 0.0002
  env_id: 'midas-train1'
  state_dim: 12
  action_dim: 2
  learning_rate_a: 0.00025
  epsilon_init: 1
  epsilon_decay: 0.999997
  epsilon_min: 0.05
  discount_factor_g: 0.99
  fc1_nodes: 512
  replay_memory_size: 100000
  network_sync_rate: 10
  enable_double_dqn: False
  enable_dueling_dqn: False
  mini_batch_size: 128
  stop_on_reward: 99999999

midas-train2:
  env_make_params:
    split: "test"
    num_trades: 3
    atr: true
    macd: true
    rsi: true
    initial_capital: 100000.0
    transaction_cost: 0.0002
  env_id: 'midas-train1'
  state_dim: 12
  action_dim: 2
  learning_rate_a: 0.001
  epsilon_init: 1
  epsilon_decay: 0.995
  epsilon_min: 0.05
  discount_factor_g: 0.99
  fc1_nodes: 512
  replay_memory_size: 100000
  network_sync_rate: 10
  enable_double_dqn: True
  enable_dueling_dqn: True
  mini_batch_size: 64
  stop_on_reward: 99999999


